{% extends "base.html" %}
{% block title %}Choose a new password – Ownerlane{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
  <h1 class="mb-2 text-xl font-semibold text-ownerMint">Choose a new password</h1>
  <p class="mb-4 text-xs text-white/65">Use at least 10 characters with uppercase, lowercase, a number and a symbol.</p>
  <form method="post" class="space-y-4 rounded-lg border border-white/10 bg-white/5 p-5">
    <label class="block text-xs text-white/70">New password
      <input type="password" name="password" required autocomplete="new-password"
             class="mt-1 w-full rounded border border-white/20 bg-black/40 px-3 py-2 text-sm text-white">
    </label>
    <label class="block text-xs text-white/70">Confirm new password
      <input type="password" name="password_confirmation" required autocomplete="new-password"
             class="mt-1 w-full rounded border border-white/20 bg-black/40 px-3 py-2 text-sm text-white">
    </label>
    <button class="w-full rounded bg-ownerCoral py-2 text-sm text-white transition hover:bg-ownerMint hover:text-black">Change password</button>
  </form>
</div>
{% endblock %}
