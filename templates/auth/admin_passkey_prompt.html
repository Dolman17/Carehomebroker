{% extends "base.html" %}
{% block title %}{{ heading }} – Ownerlane{% endblock %}
{% block content %}
<div class="mx-auto max-w-md rounded-2xl border border-white/10 bg-black/30 p-6 text-center shadow-xl">
  <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-ownerMint/15 text-2xl" aria-hidden="true">🔑</div>
  <p class="mt-5 text-[11px] uppercase tracking-[0.2em] text-ownerMint">{{ eyebrow }}</p>
  <h1 class="mt-2 text-2xl font-semibold">{{ heading }}</h1>
  <p class="mt-3 text-sm leading-6 text-white/60">{{ description }}</p>
  <div id="passkey-prompt" data-mode="{{ mode }}" data-options-url="{{ options_url }}" data-verify-url="{{ verify_url }}">
    <button id="use-passkey" type="button" class="mt-6 w-full rounded bg-ownerMint px-5 py-3 text-sm font-semibold text-ownerInk hover:bg-white">Continue with passkey</button>
    <p id="passkey-status" role="status" class="mt-3 hidden text-xs"></p>
  </div>
  {% if mode == 'login' %}<a href="{{ url_for('login') }}" class="mt-5 inline-block text-xs text-white/50 hover:text-ownerMint">Start sign-in again</a>{% endif %}
</div>
{% endblock %}
{% block extra_head %}
<script defer src="{{ url_for('static', filename='js/passkeys.js') }}"></script>
{% endblock %}
