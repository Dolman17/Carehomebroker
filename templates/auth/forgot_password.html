{% extends "base.html" %}
{% block title %}Reset password – Ownerlane{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
  <h1 class="mb-2 text-xl font-semibold text-ownerMint">Reset your password</h1>
  <p class="mb-4 text-xs text-white/65">Enter your account email. If it matches an account, we’ll send a secure link that expires in one hour.</p>
  <form method="post" class="space-y-4 rounded-lg border border-white/10 bg-white/5 p-5">
    <label class="block text-xs text-white/70">Email
      <input type="email" name="email" required autocomplete="email"
             class="mt-1 w-full rounded border border-white/20 bg-black/40 px-3 py-2 text-sm text-white">
    </label>
    <button class="w-full rounded bg-ownerCoral py-2 text-sm text-white transition hover:bg-ownerMint hover:text-black">Send reset link</button>
  </form>
  <a href="{{ url_for('login') }}" class="mt-4 inline-block text-xs text-white/65 hover:text-ownerMint">← Back to login</a>
</div>
{% endblock %}
